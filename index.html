<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>fin de año</title>

  <!-- ✅ Tipografía Boogaloo -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
    }

    /* Contenedor principal con video y texto */
    .contenedor-total {
      position: absolute;
      top: 0;
      left: 0;
      width: 2560px;
      height: 1440px;
      transform-origin: top left;
    }

    /* 🎥 VIDEO DE FONDO */
    video#fondo {
      position: absolute;
      top: 0;
      left: 0;
      width: 2560px;
      height: 1440px;
      object-fit: cover;
      z-index: 0;
    }

    /* 📝 FRASE (posición fija dentro del video) */
    .contenedor-frase {
      position: absolute;
      top: 600px;
      left: 560px;
      width: 1400px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0);
      z-index: 1;
    }

    #frase {
      font-size: 110px;
      color: white;
      font-family: "Archivo", sans-serif;
	  font-optical-sizing: auto;
      font-weight: 500;
	  font-style: normal;
      font-variation-settings:"wdth" 100;
      letter-spacing: 2px;
      text-align: center;
    }

    /* 🔢 CONTADOR */
    .contador {
      position: absolute;
      bottom: 145px;
      left: 0;
      width: 64%;
      text-align: center;
      font-size: 120px;
      font-family: "Anton", sans-serif;
      font-weight: 400;
	  font-style: normal;
      color: #2231dc;
      letter-spacing: 3px;
	  line-height: 1;
      text-shadow: 0 0 10px rgba(0,0,0,0);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="contenedor-total" id="contenedor">
    <!-- 🎥 Video de fondo -->
    <video id="fondo" autoplay muted loop playsinline>
      <source src="fondo.mp4" type="video/mp4">
    </video>

    <!-- 📝 Frase -->
    <div class="contenedor-frase">
      <div id="frase">Cargando frase...</div>
    </div>

    <!-- ⏳ Contador -->
    <div class="contador" id="contador"></div>
  </div>

  <script>
    const frases = [
      "Prometiste dormir más… pero sigues viendo “cómo doblar sábanas” a las 2:57 a.m.",
      "Prometiste comer mejor… pero el buñuelo te guiñó el ojo otra vez.",
      "Prometiste hacer más ejercicio… pero tu membresía del gym te extraña más que tu ex.",
      "Prometiste ahorrar más… pero dices “me lo merezco” muy seguido.",
      "Prometiste bajar 10 kilos… pero diciembre no coopera.",
      "Prometiste ser más organizado… pero escondiste todo en una bolsa y ya.",
      "Prometiste limpiar más… pero tu cerebro dijo: “primero un descansito” y se fue por 3 horas.",
      "Prometiste cuidar más tu corazón… pero revisaste el perfil de tu ex otra vez.",
	  "Prometiste que aprenderías inglés… pero sigues diciendo “guatsá.",
    ];

    let index = Math.floor(Math.random() * frases.length);
    const elemento = document.getElementById("frase");

    function cambiarFrase() {
      elemento.textContent = frases[index];
      index = (index + 1) % frases.length;
    }

    cambiarFrase();
    setInterval(cambiarFrase, 10000);

    /* 🕒 Cuenta regresiva */
    const contador = document.getElementById("contador");
    const fechaFin = new Date("December 31, 2025 23:59:59").getTime();

    function actualizarContador() {
      const ahora = new Date().getTime();
      const diferencia = fechaFin - ahora;

      if (diferencia <= 0) {
        contador.textContent = "¡Feliz Año Nuevo! 🎉";
        return;
      }

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

      contador.innerHTML = `${dias}<br>días`;
    }

    actualizarContador();
    setInterval(actualizarContador, 1000);

    /* 🔍 Escalar todo el contenedor (video + texto juntos) */
    function escalarPantalla() {
      const escalaX = window.innerWidth / 2560;
      const escalaY = window.innerHeight / 1440;
      const escala = Math.min(escalaX, escalaY);
      document.getElementById("contenedor").style.transform = `scale(${escala})`;
    }

    window.addEventListener("resize", escalarPantalla);
    escalarPantalla();
  </script>
</body>
</html>
